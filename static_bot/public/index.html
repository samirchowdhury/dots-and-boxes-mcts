<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dots and Boxes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Dots and Boxes</h1>
        </div>
        <button id="resetButton" class="button" type="button">New game</button>
      </header>

      <section class="game-panel" aria-label="Game status and controls">
        <div class="panel-item" aria-live="polite">
          <span class="label">Score</span>
          <strong><span id="humanScore">0</span> - <span id="botScore">0</span></strong>
        </div>

        <div class="panel-item" aria-live="polite">
          <span class="label">Turn</span>
          <strong id="status">Loading bot...</strong>
        </div>

        <label class="field">
          <span>You play</span>
          <select id="playerSelect">
            <option value="0">First</option>
            <option value="1">Second</option>
          </select>
        </label>

        <label class="field">
          <span>Simulations</span>
          <input id="simulationsInput" type="number" min="1" max="5000" step="50" value="300" />
        </label>

        <div class="legend">
          <span><i class="swatch player-0"></i> Player 0</span>
          <span><i class="swatch player-1"></i> Player 1</span>
        </div>
      </section>

      <section class="workspace">
        <div class="board-panel">
          <svg id="board" role="img" aria-label="Dots and Boxes board"></svg>
        </div>
      </section>
    </main>

    <script
      data-goatcounter="https://retro-puzzles.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
    <script type="module" src="./src/ui/app.js?v=dark-top-panel"></script>
  </body>
</html>
