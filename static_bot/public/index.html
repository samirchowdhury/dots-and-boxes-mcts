<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>D&B EpsilonZero</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>D&B EpsilonZero</h1>
          <p id="botLabel" class="muted">Loading bot...</p>
        </div>
        <button id="resetButton" class="button" type="button">New game</button>
      </header>

      <section class="status-band" aria-live="polite">
        <div>
          <span class="label">Score</span>
          <strong><span id="humanScore">0</span> - <span id="botScore">0</span></strong>
        </div>
        <div>
          <span class="label">Turn</span>
          <strong id="status">Loading bot...</strong>
        </div>
        <div>
          <span class="label">Bot</span>
          <strong id="botSummary">ITER</strong>
        </div>
        <div>
          <span class="label">Last Move</span>
          <strong id="lastMove">Start</strong>
        </div>
      </section>

      <section class="workspace">
        <div class="board-panel">
          <svg id="board" role="img" aria-label="Dots and Boxes board"></svg>
        </div>

        <aside class="side-panel" aria-label="Game controls">
          <label class="field">
            <span>You play</span>
            <select id="playerSelect">
              <option value="0">First</option>
              <option value="1">Second</option>
            </select>
          </label>

          <label class="field">
            <span>Simulations</span>
            <input id="simulationsInput" type="number" min="1" max="5000" step="50" value="300" />
          </label>

          <label class="field">
            <span>Backend</span>
            <select id="backendSelect">
              <option value="js">JavaScript</option>
              <option value="wasm">WASM fallback</option>
            </select>
          </label>

          <div class="legend">
            <span><i class="swatch player-0"></i> Player 0</span>
            <span><i class="swatch player-1"></i> Player 1</span>
          </div>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/ui/app.js"></script>
  </body>
</html>
