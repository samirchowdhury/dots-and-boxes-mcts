<html lang="en">

      background: #07090d;
      color: #f4f7fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(73, 129, 178, 0.20), transparent 34%),
        radial-gradient(circle at 18% 16%, rgba(93, 201, 151, 0.13), transparent 28%),
        linear-gradient(150deg, #05070b 0%, #0a1119 52%, #05070b 100%);
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hud {
      position: fixed;
      inset: 28px 32px auto 32px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      pointer-events: none;
    }
    .title {
      max-width: 780px;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.42);
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 58px);
      line-height: 1.02;
      letter-spacing: 0;
    }
    .subtitle {
      margin-top: 9px;
      max-width: 600px;
      color: rgba(230, 237, 245, 0.70);
      font-size: 15px;
      line-height: 1.45;
    }
    .controls {
      width: 306px;
      display: grid;
      gap: 10px;
      pointer-events: auto;
    }
    .panel {
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(12, 20, 31, 0.72), rgba(5, 8, 13, 0.58));
      box-shadow: 0 22px 80px rgba(0,0,0,0.44);
      backdrop-filter: blur(20px);
      border-radius: 8px;
      padding: 12px;
    }
    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    button {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.055);
      color: rgba(244,247,251,0.76);
      border-radius: 7px;
      height: 34px;
      cursor: pointer;
      font-weight: 650;
    }
    button.active {
      color: #081014;
      background: #9fe7c1;
      border-color: transparent;
    }
    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: rgba(244,247,251,0.72);
      font-size: 13px;
      margin-top: 10px;
    }
    input[type="range"] { width: 155px; accent-color: #9ad7b1; }
    .caption {
      position: fixed;
      left: 32px;
      bottom: 64px;
      color: rgba(244,247,251,0.72);
      font-size: 13px;
      line-height: 1.45;
      pointer-events: none;
      text-shadow: 0 8px 24px rgba(0,0,0,0.58);
    }
    .legend {
      position: fixed;
      left: 32px;
      bottom: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      color: rgba(244,247,251,0.72);
      font-size: 13px;
      pointer-events: none;
    }
    .key {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .hint {
      position: fixed;
      right: 32px;
      bottom: 28px;
      color: rgba(244,247,251,0.55);
      font-size: 13px;
      pointer-events: none;
    }
    body.capture .controls,
    body.capture .hint {
      display: none;
    }
    body.capture .hud {
      inset: 34px 40px auto 40px;
    }
    body.capture .title {
      max-width: 700px;
    }
    body.capture h1 {
      font-size: clamp(34px, 5vw, 58px);
    }
    body.capture .subtitle {
      max-width: 590px;
      font-size: 14px;
    }
    body.capture .caption {
      left: 40px;
      bottom: 76px;
    }
    body.capture .legend {
      left: 40px;
      bottom: 38px;
    }
  </style>
</head>
